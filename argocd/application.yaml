apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jp-study
  namespace: argocd
spec:
  destination:
    namespace: jp-study
    server: https://kubernetes.default.svc
  project: default
  source:
    path: k8s
    repoURL: https://github.com/soowampy/jp-study.git
    targetRevision: master
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
